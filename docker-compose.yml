services:
  kittentts-fastapi:
    container_name: kittentts-fastapi
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # This build argument ensures only CPU dependencies are installed
        - RUNTIME=cpu
    ports:
      - "${PORT:-8005}:8005"
    env_file:
      - .env
    
    restart: unless-stopped
    environment:
      # Enable faster Hugging Face downloads inside the container
      - HF_HUB_ENABLE_HF_TRANSFER=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8005/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

