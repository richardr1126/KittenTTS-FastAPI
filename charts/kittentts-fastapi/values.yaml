app-template:
  # yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/values.schema.json
  
  controllers:
    main:
      replicas: 1
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        main:
          image:
            repository: ghcr.io/richardr1126/kittentts-fastapi-cpu
            # repository: ghcr.io/richardr1126/kittentts-fastapi-gpu # Uncomment for GPU image
            tag: latest # Use latest, main, or a release tag like v1.2.3
            pullPolicy: IfNotPresent
          env:
            TZ: UTC
            # KITTEN_SERVER_HOST: 0.0.0.0
            # KITTEN_SERVER_PORT: 8005
            # KITTEN_SERVER_ENABLE_PERFORMANCE_MONITOR: "false"
            # KITTEN_SERVER_WORKERS: "1"
            # KITTEN_MAX_CONCURRENT_GENERATIONS: "1"
            # KITTEN_GENERATION_QUEUE_TIMEOUT_SECONDS: "30"
            # KITTEN_MODEL_REPO_ID: KittenML/kitten-tts-nano-0.8-fp32
            # KITTEN_TTS_DEVICE: auto # cpu, cuda, or auto
            # KITTEN_MODEL_CACHE: /app/model_cache
            # KITTEN_AUDIO_FORMAT: wav # wav, mp3, opus, aac
            # KITTEN_TEXT_PROFILE: balanced # balanced, narration, dialogue
            # KITTEN_TEXT_PROFILES_JSON: '{"balanced":{"pause_strength":"strong"}}'
            # KITTEN_UI_TITLE: Kitten TTS Server
            # KITTEN_UI_SHOW_LANGUAGE_SELECT: "true"
            # HF_HUB_ENABLE_HF_TRANSFER: "1"
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health/ready
                  port: 8005
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 30
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health/live
                  port: 8005
                initialDelaySeconds: 15
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health/ready
                  port: 8005
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 6
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
              # nvidia.com/gpu: 1 # Uncomment to request a GPU
  
  service:
    main:
      controller: main
      ports:
        http:
          port: 8005
  
  ingress:
    main:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - host: kittentts.local
          paths:
            - path: /
              service:
                identifier: main
                port: http
  
  persistence:
    model-cache:
      enabled: true
      type: emptyDir
      # type: persistentVolumeClaim
      # storageClass: "-"
      # accessMode: ReadWriteOnce
      # size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /app/model_cache
